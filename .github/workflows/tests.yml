name: Tests

on:
  push:
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # HA Core itself ships Python 3.13 only (3.12 was dropped late 2025).
        # `AddConfigEntryEntitiesCallback` only exists on HA >= ~2025.x; the
        # 3.12 lane pulled HA 2025.1.4 which predates it. Sticking with 3.13.
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "ruff>=0.5" \
            "mypy>=1.10" \
            "pytest>=8.0" \
            "pytest-asyncio>=0.24" \
            "pytest-cov>=5.0" \
            "pytest-homeassistant-custom-component" \
            "python-socketio>=5.12.0" \
            "aioresponses>=0.7"

      - name: Ruff check
        run: ruff check custom_components tests

      - name: Ruff format check
        run: ruff format --check custom_components tests

      - name: Mypy strict
        run: mypy custom_components/culiplan

      - name: Pytest
        run: |
          pytest --cov=custom_components/culiplan \
                 --cov-report=term-missing \
                 --cov-fail-under=95 \
                 tests/
